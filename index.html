<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShowMo · Deep Dark Vision</title>
<meta name="description" content="WinEye 智能窗户摄像头 · 产品渲染图集">
<meta property="og:title" content="ShowMo · Deep Dark Vision">
<meta property="og:description" content="WinEye 智能窗户摄像头 · 产品渲染图集">
<style>
  :root{--bg:#0b0c0e;--panel:#141619;--line:#23272d;--txt:#e8eaed;--dim:#8b9097;--accent:#5aa2ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:15px/1.6 -apple-system,"PingFang SC",Segoe UI,sans-serif}
  header{text-align:center;padding:60px 20px 40px}
  header h1{font-size:30px;font-weight:600;letter-spacing:1px}
  header p{color:var(--dim);margin-top:10px}
  .wrap{max-width:1200px;margin:0 auto;padding:0 20px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:zoom-in;transition:.18s}
  .card:hover{border-color:var(--accent);transform:translateY(-3px)}
  .card .thumb{background:#000;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .card img{width:100%;height:100%;object-fit:contain}
  .card .info{padding:12px 14px;display:flex;justify-content:space-between;color:var(--dim);font-size:12px}
  .card .dl{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;border:1px solid var(--line);
            width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
            text-decoration:none;font-size:15px;opacity:0;transition:.15s}
  .card:hover .dl{opacity:1}
  footer{text-align:center;color:var(--dim);font-size:12px;padding:30px}
  #lb{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out}
  #lb img{max-width:94vw;max-height:94vh;border-radius:8px}
  .lbdl{position:fixed;top:20px;right:24px;background:var(--accent);color:#06101f;font-weight:600;
        padding:10px 18px;border-radius:9px;text-decoration:none;font-size:14px;z-index:51}
</style>
</head>
<body>
  <header><h1>ShowMo · Deep Dark Vision</h1><p>WinEye 智能窗户摄像头 · 产品渲染图集</p></header>
  <div class="wrap"><div class="grid" id="grid"></div></div>
  <footer>Rendered with Blender · Cycles</footer>
  <div id="lb"><a id="lbDl" class="lbdl" download onclick="event.stopPropagation()">⬇ 下载图片</a><img id="lbImg"></div>
<script>
  const DATA = [{"img": "img/render_20260618_104901.jpg", "time": "2026-06-18 10:49:01", "resolution": "1000x1250", "samples": 80, "elapsed": 12.1, "lens": 105.0}, {"img": "img/render_20260618_101116.jpg", "time": "2026-06-18 10:11:16", "resolution": "1280x1600", "samples": 256, "elapsed": 30.0, "lens": 105.0}, {"img": "img/render_20260618_100926.jpg", "time": "2026-06-18 10:09:26", "resolution": "1280x1600", "samples": 256, "elapsed": 30.0, "lens": 105.0}, {"img": "img/render_20260618_100804.jpg", "time": "2026-06-18 10:08:04", "resolution": "1280x1600", "samples": 256, "elapsed": 28.3, "lens": 105.0}, {"img": "img/render_20260618_100641.jpg", "time": "2026-06-18 10:06:41", "resolution": "1280x1600", "samples": 256, "elapsed": 27.1, "lens": 105.0}, {"img": "img/render_20260618_100422.jpg", "time": "2026-06-18 10:04:22", "resolution": "800x1000", "samples": 200, "elapsed": 12.7, "lens": 105.0}, {"img": "img/render_20260618_100350.jpg", "time": "2026-06-18 10:03:50", "resolution": "800x1000", "samples": 200, "elapsed": 10.8, "lens": 105.0}, {"img": "img/render_20260618_100321.jpg", "time": "2026-06-18 10:03:21", "resolution": "960x1200", "samples": 64, "elapsed": 9.7, "lens": 105.0}, {"img": "img/render_20260618_095746.jpg", "time": "2026-06-18 09:57:46", "resolution": "3072x3840", "samples": 768, "elapsed": 207.0, "lens": 105.0}, {"img": "img/render_20260618_095026.jpg", "time": "2026-06-18 09:50:26", "resolution": "1280x1600", "samples": 96, "elapsed": 19.0, "lens": 105.0}];
  const lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbDl=document.getElementById('lbDl');
  lb.onclick=()=>lb.style.display='none';
  function open1(img){lbImg.src=img;lbDl.href=img;lbDl.download=img.split('/').pop();lb.style.display='flex'}
  document.getElementById('grid').innerHTML = DATA.map(d=>`
    <div class="card" onclick="open1('${d.img}')">
      <a class="dl" href="${d.img}" download="${d.img.split('/').pop()}" onclick="event.stopPropagation()" title="下载图片">⬇</a>
      <div class="thumb"><img loading="lazy" src="${d.img}" alt="ShowMo render ${d.time}"></div>
      <div class="info"><span>${d.resolution}</span><span>${d.time.slice(5)}</span></div>
    </div>`).join("");
</script>
</body>
</html>
